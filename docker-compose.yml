services:
  music-tracker:
    image: music-tracker
    container_name: music-tracker
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3443:3443"
    volumes:
      - /mnt/user/appdata/music-tracker:/data
      - /mnt/user:/mnt/user:ro
    environment:
      - DATA_PATH=/data/data.json
      # Set to your NAS IP to enable HTTPS (required for microphone on iPhone)
      # Example: HTTPS_HOST=192.168.1.100
      - HTTPS_HOST=
      # Session key from claude.ai browser cookies — used by /api/claude-usage proxy
      - CLAUDE_SESSION_KEY=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
