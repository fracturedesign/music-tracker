<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Orbit</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- iPhone / iPad home screen -->
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orbit" />

    <!-- Theme colour (browser chrome on Android) -->
    <meta name="theme-color" content="#0b0b10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      :root {
        --font-sans: "Space Grotesk", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", monospace;
        --bg: #0b0b10;
        --surface: #131320;
        --surface-2: #1a1a2a;
        --line: rgba(255,255,255,0.055);
        --line-strong: rgba(255,255,255,0.1);
        --text: #f3f3f8;
        --muted: #8a8a9e;
        --faint: #6a6a86;
        --dim: #55556a;
        --indigo: #818cf8;
        --indigo-deep: #6366f1;
        --green: #34d399;
        --green-soft: #6ee7b7;
        --flame: #fb923c;
      }
      html, body { height: 100%; }
      body {
        background: #060609;
        color: var(--text);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100%; }

      .mono { font-family: var(--font-mono); }

      /* App shell — phone-first column, adapts to a desktop dashboard */
      .app {
        position: relative;
        margin: 0 auto;
        max-width: 460px;
        min-height: 100vh;
        background: var(--bg);
        padding: 8px 18px 48px;
        overflow-x: hidden;
      }

      /* tablet / standalone phone-card framing */
      @media (min-width: 620px) and (max-width: 919px) {
        body { display: flex; align-items: flex-start; justify-content: center; }
        .app {
          margin: 28px auto;
          min-height: 0;
          border-radius: 28px;
          border: 1px solid rgba(255,255,255,0.07);
          box-shadow: 0 40px 100px -34px rgba(0,0,0,0.9);
        }
      }

      /* desktop dashboard */
      @media (min-width: 920px) {
        .app { max-width: 1180px; padding: 24px 32px 64px; }
      }

      /* adaptive columns: single flow on phone, two columns on desktop */
      .cols { display: flex; flex-direction: column; gap: 14px; margin-top: 14px; }
      .col { display: contents; }
      .cols .card { margin-bottom: 0 !important; }
      @media (min-width: 920px) {
        .cols { flex-direction: row; align-items: flex-start; gap: 20px; margin-top: 22px; }
        .col { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
        .col-a { flex: 1.05; }
        .col-b { flex: 0.95; }
      }

      input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

      /* range slider */
      input[type=range].mt {
        -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 6px;
        background: var(--surface-2); outline: none; cursor: pointer;
      }
      input[type=range].mt::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%;
        background: #fff; border: 4px solid var(--indigo-deep); cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
      input[type=range].mt::-moz-range-thumb {
        width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 4px solid var(--indigo-deep); cursor: pointer;
      }

      textarea.mt, input.mt-text, select.mt-text {
        width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px;
        color: var(--text); font-family: var(--font-sans); font-size: 14px; padding: 13px 14px; outline: none; resize: none;
      }
      textarea.mt:focus, input.mt-text:focus, select.mt-text:focus { border-color: var(--indigo); }
      textarea.mt::placeholder, input.mt-text::placeholder { color: var(--dim); }

      /* overlay + bottom sheet */
      .overlay {
        position: fixed; inset: 0; background: rgba(4,4,8,0.62); backdrop-filter: blur(3px);
        z-index: 50; display: flex; align-items: flex-end; justify-content: center; animation: mtfade .2s ease;
      }
      .sheet {
        width: 100%; max-width: 460px; background: var(--surface);
        border-top-left-radius: 26px; border-top-right-radius: 26px; border-top: 1px solid var(--line);
        padding: 8px 20px 26px; height: 92vh; overflow-y: auto; animation: mtslide .28s cubic-bezier(.2,.8,.2,1);
      }
      .grab { width: 38px; height: 4px; border-radius: 4px; background: var(--line); margin: 6px auto 14px; }
      .scrollless::-webkit-scrollbar, .sheet::-webkit-scrollbar { display: none; }
      .sheet { scrollbar-width: none; }
      @keyframes mtslide { from { transform: translateY(100%); } to { transform: translateY(0); } }
      @keyframes mtfade { from { opacity: 0; } to { opacity: 1; } }

      .toast {
        position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
        background: #1d2b24; border: 1px solid rgba(52,211,153,0.4); color: var(--green-soft);
        padding: 11px 18px; border-radius: 13px; font-size: 13.5px; font-weight: 600; z-index: 80;
        box-shadow: 0 12px 30px -10px rgba(0,0,0,0.7); animation: mtpop .3s cubic-bezier(.2,.9,.3,1.3);
      }
      @keyframes mtpop { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }
      @keyframes mtmodal { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }

      .pulse-dot { animation: pulseDot 1.5s ease-in-out infinite; }
      @keyframes pulseDot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.78); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
    <script type="module" crossorigin src="/assets/index-BpLdlBSJ.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
